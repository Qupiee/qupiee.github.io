                            <a href="emotes.html"

                <a href="panels.html" class="pl-6 py-2 border-l border-[#67e8f9]">→ Панельки</a>

    <main class="pt-24 pb-16 px-4 md:px-10 min-h-screen">
        <h1 class="text-4xl md:text-6xl font-black text-center neon-text mb-12 tracking-tight">
            ГАЛЕРЕЯ
        </h1>
        <div id="gallery" class="columns-2 md:columns-3 lg:columns-4 xl:columns-5 gap-4"></div>
        <div id="pagination" class="flex justify-center items-center gap-3 mt-12 flex-wrap">
        </div>
    </main>

    <div id="modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[100] p-4">
        <div
            class="relative max-w-[95vw] max-h-[95vh] bg-[#0a1428] rounded-2xl overflow-hidden border border-[#67e8f9]/30 shadow-2xl">
            <button onclick="closeModal()"
                class="absolute top-4 right-4 text-4xl text-[#67e8f9] z-20 hover:text-[#f472b6] transition-colors">
                ×
            </button>
            <img id="modal-image" src="" alt="" class="max-w-full max-h-[90vh] w-auto h-auto object-contain">
        </div>
    </div>

    <footer class="bg-[#050d1f] py-12 border-t border-[#67e8f9]/20">
        <div class="max-w-7xl mx-auto px-6 text-center text-sm text-slate-400">
            Yui Morgan
        </div>
    </footer>

    <script>
        const ITEMS_PER_PAGE = 10;
        const gallery = document.getElementById('gallery');
        const pagination = document.getElementById('pagination');
        let allItems = [];

        function createGalleryItem(item) {
            const wrapper = document.createElement('div');
            wrapper.className = 'gallery-item';

            const img = document.createElement('img');
            img.className = 'w-full h-auto rounded-xl shadow-lg gallery-img cursor-pointer';
            img.src = item.src;
            img.alt = item.author || '';
            if (item.width && item.height) {
                img.width = item.width;
                img.height = item.height;
            }
            img.loading = 'lazy';
            img.onclick = () => openModal(item.src);
            wrapper.appendChild(img);

            const caption = document.createElement(item.link ? 'a' : 'p');
            caption.className = 'block text-center text-sm mt-2 text-slate-400 hover:text-neon-teal';
            caption.textContent = 'Автор: ' + (item.author || 'неизвестен');
            if (item.link) {
                caption.href = item.link;
                caption.target = '_blank';
            }
            wrapper.appendChild(caption);
            return wrapper;
        }

        function renderGalleryItems(data) {
            gallery.innerHTML = '';
            allItems = data.map(item => createGalleryItem(item));
            allItems.forEach(el => gallery.appendChild(el));
        }

        async function initGallery() {
            try {
                const res = await fetch('gallery-data.json');
                const data = await res.json();
                renderGalleryItems(data);
                if (allItems.length > 0) showPage(1);
            } catch (e) {
                console.error('Ошибка загрузки галереи', e);
            }
        }

        function showPage(page) {
            const start = (page - 1) * ITEMS_PER_PAGE;
            const end = start + ITEMS_PER_PAGE;

            allItems.forEach(item => item.style.display = 'none');
            allItems.slice(start, end).forEach(item => {
                item.style.display = 'block';
            });

            renderPagination(page);
        }

        function renderPagination(currentPage) {
            const totalPages = Math.ceil(allItems.length / ITEMS_PER_PAGE);
            pagination.innerHTML = '';

            if (totalPages <= 1) return;

            const prev = document.createElement('button');
            prev.textContent = '« Назад';
            prev.className = 'px-5 py-2 bg-[#1e3a5f]/50 rounded-lg hover:bg-[#67e8f9]/30 disabled:opacity-40';
            prev.disabled = currentPage === 1;
            prev.onclick = () => {
                if (currentPage > 1) showPage(currentPage - 1);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };
            pagination.appendChild(prev);

            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button');
                btn.textContent = i;
                btn.className = 'w-10 h-10 flex items-center justify-center rounded-lg transition-colors ' +
                    (i === currentPage
                        ? 'bg-neon-teal text-[#0a1428] font-bold'
                        : 'hover:bg-[#67e8f9]/20');
                btn.onclick = () => showPage(i);
                window.scrollTo({ top: 0, behavior: 'smooth' });
                pagination.appendChild(btn);
            }

            const next = document.createElement('button');
            next.textContent = 'Вперёд »';
            next.className = 'px-5 py-2 bg-[#1e3a5f]/50 rounded-lg hover:bg-[#67e8f9]/30 disabled:opacity-40';
            next.disabled = currentPage === totalPages;
            next.onclick = () => {
                if (currentPage < totalPages) showPage(currentPage + 1);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };
            pagination.appendChild(next);
        }

        initGallery();

        function openModal(src) {
            document.getElementById('modal-image').src = src;
            const modal = document.getElementById('modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        document.getElementById('modal').addEventListener('click', function (e) {
            if (e.target === this) closeModal();
        });

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeModal();
        });

        function toggleMobileMenu() {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        }

        function toggleDropdown(btn) {
            document.getElementById('dropdown-menu').classList.toggle('hidden');
        }

        document.addEventListener('click', e => {
            if (!e.target.closest('.group')) {
                const dd = document.getElementById('dropdown-menu');
                if (dd) dd.classList.add('hidden');
            }
        });
    </script>
</body>
