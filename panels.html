    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap">
</head>

<body class="text-slate-200 overflow-x-hidden">

    <nav
        class="cyber-header fixed top-0 left-0 right-0 z-50 bg-[#0a1428]/90 backdrop-blur-xl border-b border-[#67e8f9]/20">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">

            <div class="flex items-center gap-3">
                <a href="index.html" class="text-3xl font-bold tracking-tighter neon-text"><img src="images/mish/18.gif"
                        class="logo_img" /></span></a>
            </div>

            <div class="hidden md:flex items-center gap-10 text-sm font-medium">
                <a href="index.html" class="nav-link text-[#e0f2fe] hover:text-[#67e8f9]">ГЛАВНАЯ</a>

                <div class="group relative">
                    <button onclick="toggleDropdown(this)"
                        class="nav-link flex items-center gap-1 text-[#e0f2fe] hover:text-[#67e8f9]">
                        ХУДОЖНИКИ
                        <i class="fa-solid fa-chevron-down text-xs transition-transform group-hover:rotate-180"></i>
                    </button>
                    <div id="dropdown-menu" class="absolute hidden group-hover:block pt-6">
                        <div
                            class="bg-[#0f1f3a] border border-[#67e8f9]/30 rounded-2xl p-6 w-64 shadow-2xl neon-teal-glow">
                            <a href="model.html"
                                class="block py-3 px-4 hover:bg-[#1e3a5f] rounded-xl flex items-center gap-3 transition-colors">
                                <span class="text-[#f472b6]">✦</span>
                                <span>Модель</span>
                            </a>
                            <a href="emotes.html"
                                class="block py-3 px-4 hover:bg-[#1e3a5f] rounded-xl flex items-center gap-3 transition-colors">
                                <span class="text-[#67e8f9]">✦</span>
                                <span>Смайлики</span>
                            </a>
                            <a href="overlay.html"
                                class="block py-3 px-4 hover:bg-[#1e3a5f] rounded-xl flex items-center gap-3 transition-colors">
                                <span class="text-[#f472b6]">✦</span>
                                <span>Оверлей</span>
                            </a>
                            <a href="panels.html"
                                class="block py-3 px-4 hover:bg-[#1e3a5f] rounded-xl flex items-center gap-3 transition-colors">
                                <span class="text-[#67e8f9]">✦</span>
                                <span>Панельки</span>
                            </a>
                            <a href="alerts.html"
                                class="block py-3 px-4 hover:bg-[#1e3a5f] rounded-xl flex items-center gap-3 transition-colors">
                                <span class="text-[#f472b6]">✦</span>
                                <span>Алёрты</span>
                            </a>
                        </div>
                    </div>
                </div>
                <a href="gallery.html" class="nav-link text-[#e0f2fe] hover:text-[#67e8f9]">ГАЛЕРЕЯ</a>
                <a href="thanks.html" class="nav-link text-[#e0f2fe] hover:text-[#67e8f9]">ОСОБЫЕ БЛАГОДАРНОСТИ</a>
            </div>

            <button onclick="toggleMobileMenu()" class="md:hidden text-3xl">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>

        <div id="mobile-menu" class="hidden md:hidden bg-[#0a1428] border-t border-[#67e8f9]/30 py-6">
            <div class="flex flex-col px-6 gap-6 text-lg">
                <a href="index.html" class="py-2">ГЛАВНАЯ</a>
                <p class="py-2">ХУДОЖНИКИ</p>
                <a href="model.html" class="pl-6 py-2 border-l border-[#f472b6]">→ Модель</a>
                <a href="emotes.html" class="pl-6 py-2 border-l border-[#67e8f9]">→ Смайлики</a>
                <a href="overlay.html" class="pl-6 py-2 border-l border-[#f472b6]">→ Оверлей</a>
                <a href="panels.html" class="pl-6 py-2 border-l border-[#67e8f9]">→ Панельки</a>
                <a href="alerts.html" class="pl-6 py-2 border-l border-[#f472b6]">→ Алёрты</a>
                <a href="gallery.html" class="py-2">ГАЛЕРЕЯ</a>
                <a href="thanks.html" class="py-2">ОСОБЫЕ БЛАГОДАРНОСТИ</a>
            </div>
        </div>
    </nav>

    <main class="pt-24 pb-20 min-h-screen">
        <div class="max-w-7xl mx-auto px-6">
            <h1 class="text-6xl font-black neon-text text-center">Панельки</h1>

            <br />
            <div class="flex justify-between items-end mb-12">
                <div>
                    <p class="text-[#f472b6] text-xl">Автор: Anastaysha</p>
                </div>
                <a href="https://vk.com/anastaysha69696969" class="text-4xl hover:text-[#f472b6]" target="_blank"><i
                        class="fa-brands fa-vk"></i></a>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-5 gap-4">

                <img onclick="openModal(this.src)" src="images/anasteysha/1.png"
                    class="gallery-img rounded-2xl cursor-pointer">
                <img onclick="openModal(this.src)" src="images/anasteysha/2.png"
                    class="gallery-img rounded-2xl cursor-pointer">
                <img onclick="openModal(this.src)" src="images/anasteysha/3.png"
                    class="gallery-img rounded-2xl cursor-pointer">
                <img onclick="openModal(this.src)" src="images/anasteysha/4.png"
                    class="gallery-img rounded-2xl cursor-pointer">
                <img onclick="openModal(this.src)" src="images/anasteysha/5.png"
                    class="gallery-img rounded-2xl cursor-pointer">
            </div>
        </div>
    </main>

    <footer class="bg-[#050d1f] py-12 border-t border-[#67e8f9]/20">
        <div class="max-w-7xl mx-auto px-6 text-center text-sm text-slate-400">
            Yui Morgan
        </div>
    </footer>

    <div id="modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[100]">
        <div class="modal max-w-4xl w-full mx-4 bg-[#0a1428] rounded-3xl overflow-hidden relative">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-4xl text-white z-10">&times;</button>
            <img id="modal-image" src="" alt="" class="w-full h-auto">
        </div>
    </div>

    <script>
        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
        }

        function toggleDropdown(btn) {
            const dropdown = document.getElementById('dropdown-menu');
            dropdown.classList.toggle('hidden');
        }

        function openModal(src) {
            document.getElementById('modal-image').src = src;
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        document.getElementById('modal').addEventListener('click', function (e) {
            if (e.target === this) {
                closeModal();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !modal.classList.contains('hidden')) {
                closeModal();
            }
        });

        document.addEventListener('click', function (e) {
            if (!e.target.closest('.group')) {
                const dd = document.getElementById('dropdown-menu');
                if (dd) dd.classList.add('hidden');
            }
        });
    </script>
</body>

</html>
