                            <a href="emotes.html"

                            <a href="overlay.html"
                                class="block py-3 px-4 hover:bg-[#1e3a5f] rounded-xl flex items-center gap-3 transition-colors">

                <a href="panels.html" class="pl-6 py-2 border-l border-[#67e8f9]">→ Панельки</a>

    <main class="pt-24 pb-20 min-h-screen">
        <div class="max-w-7xl mx-auto px-6">
            <h1 class="text-6xl font-black neon-text text-center">Модель</h1>

            <br />
            <div class="flex justify-between items-end mb-12">
                <div>
                    <p class="text-[#f472b6] text-xl">Автор: Акси</p>
                </div>
                <a href="https://t.me/aksouch" class="text-4xl hover:text-[#f472b6]" target="_blank"><i
                        class="fa-brands fa-telegram"></i></a>
            </div>

            <div class="mt-8">
                <div class="relative max-w-4xl mx-auto">
                    <div class="overflow-hidden rounded-3xl border border-[#67e8f9]/40 bg-[#050d1f]/60">

                        <div class="carousel-slide flex justify-center items-center py-4">
                            <img onclick="openModal(this.src)" src="images/aksi/1.png"
                                class="w-full h-auto max-h-[80vh] object-contain rounded-2xl cursor-pointer">
                        </div>
                        <div class="carousel-slide hidden flex justify-center items-center py-4">
                            <img onclick="openModal(this.src)" src="images/aksi/2.png"
                                class="w-full h-auto max-h-[80vh] object-contain rounded-2xl cursor-pointer">
                        </div>
                        <div class="carousel-slide hidden flex justify-center items-center py-4">
                            <img onclick="openModal(this.src)" src="images/aksi/3.png"
                                class="w-full h-auto max-h-[80vh] object-contain rounded-2xl cursor-pointer">
                        </div>
                    </div>

                    <button onclick="prevSlide()"
                        class="absolute top-1/2 -left-4 md:-left-8 -translate-y-1/2 bg-[#0a1428]/80 hover:bg-[#1e293b] border border-[#67e8f9]/60 text-[#67e8f9] w-10 h-10 md:w-12 md:h-12 rounded-full flex items-center justify-center shadow-lg">
                        << </button>
                            <button onclick="nextSlide()"
                                class="absolute top-1/2 -right-4 md:-right-8 -translate-y-1/2 bg-[#0a1428]/80 hover:bg-[#1e293b] border border-[#67e8f9]/60 text-[#67e8f9] w-10 h-10 md:w-12 md:h-12 rounded-full flex items-center justify-center shadow-lg">
                                >>
                            </button>

                            <div class="flex justify-center gap-3 mt-4">
                                <button onclick="goToSlide(0)"
                                    class="carousel-dot w-3 h-3 rounded-full bg-[#1e293b] border border-[#67e8f9]/70"></button>
                                <button onclick="goToSlide(1)"
                                    class="carousel-dot w-3 h-3 rounded-full bg-[#1e293b] border border-[#67e8f9]/70"></button>
                                <button onclick="goToSlide(2)"
                                    class="carousel-dot w-3 h-3 rounded-full bg-[#1e293b] border border-[#67e8f9]/70"></button>
                            </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-[#050d1f] py-12 border-t border-[#67e8f9]/20">
        <div class="max-w-7xl mx-auto px-6 text-center text-sm text-slate-400">
            Yui Morgan
        </div>
    </footer>

    <div id="modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[100] p-4">
        <div
            class="modal relative max-w-[95vw] max-h-[95vh] bg-[#0a1428] rounded-3xl overflow-hidden border border-[#67e8f9]/30 shadow-2xl">
            <button onclick="closeModal()"
                class="absolute top-4 right-4 text-4xl text-[#67e8f9] z-10 hover:text-[#f472b6] transition-colors">&times;</button>
            <img id="modal-image" src="" alt="" class="max-w-full max-h-[90vh] w-auto h-auto object-contain">
        </div>
    </div>

    <script>
        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
        }

        function toggleDropdown(btn) {
            const dropdown = document.getElementById('dropdown-menu');
            dropdown.classList.toggle('hidden');
        }

        function openModal(src) {
            document.getElementById('modal-image').src = src;
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        document.getElementById('modal').addEventListener('click', function (e) {
            if (e.target === this) {
                closeModal();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !modal.classList.contains('hidden')) {
                closeModal();
            }
        });

        const slides = document.querySelectorAll('.carousel-slide');
        const dots = document.querySelectorAll('.carousel-dot');
        let currentSlide = 0;

        function updateCarousel() {
            if (!slides.length) return;

            slides.forEach((slide, index) => {
                if (index === currentSlide) {
                    slide.classList.remove('hidden');
                } else {
                    slide.classList.add('hidden');
                }
            });

            if (dots.length) {
                dots.forEach((dot, index) => {
                    if (index === currentSlide) {
                        dot.classList.add('bg-neon-teal');
                        dot.classList.remove('bg-[#1e293b]');
                    } else {
                        dot.classList.remove('bg-neon-teal');
                        dot.classList.add('bg-[#1e293b]');
                    }
                });
            }
        }

        function goToSlide(index) {
            if (!slides.length) return;
            const total = slides.length;
            currentSlide = ((index % total) + total) % total;
            updateCarousel();
        }

        function nextSlide() {
            goToSlide(currentSlide + 1);
        }

        function prevSlide() {
            goToSlide(currentSlide - 1);
        }

        document.addEventListener('DOMContentLoaded', updateCarousel);

        document.addEventListener('click', function (e) {
            if (!e.target.closest('.group')) {
                const dd = document.getElementById('dropdown-menu');
                if (dd) dd.classList.add('hidden');
            }
        });
    </script>
</body>
